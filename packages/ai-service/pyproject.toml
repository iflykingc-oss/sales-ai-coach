[project]
name = "sales-ai-coach-ai"
version = "0.1.0"
description = "AI model proxy service for Sales AI Coach"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
    "httpx>=0.28.0",
    "openai>=1.59.0",
    "anthropic>=0.42.0",
    "python-multipart>=0.0.20",
    "python-dotenv>=1.0.1",
    "redis>=5.2.1",
    "lark-oapi>=1.4.5",
    "cryptography>=42.0.0",
]

[tool.uvicorn]
app = "app.main:app"
host = "0.0.0.0"
port = 8000
reload = true
