services:
  postgres:
    image: postgres:16-alpine
    container_name: sales-ai-coach-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sales_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sales_ai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sales_ai_coach}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sales-ai-coach-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
