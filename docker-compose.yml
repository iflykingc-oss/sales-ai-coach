services:
  postgres:
    image: postgres:16-alpine
    container_name: sales-ai-coach-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sales_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sales_ai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sales_ai_coach}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sales-ai-coach-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: sales-ai-coach-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-sales_ai}:${POSTGRES_PASSWORD:-sales_ai_secret}@postgres:5432/${POSTGRES_DB:-sales_ai_coach}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      SENTRY_DSN: ${SENTRY_DSN:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: sales-ai-coach-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

  ai-service:
    build:
      context: ./packages/ai-service
      dockerfile: Dockerfile
    container_name: sales-ai-coach-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
