name: Crawl Sales Knowledge

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run crawler
        id: crawl
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node scripts/crawl-and-insert.js 2>&1 | tee crawl-output.log
          echo "done=true" >> $GITHUB_OUTPUT

      - name: Notify Feishu
        if: always()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          # 解析结果（只取最后一行匹配）
          LOG="crawl-output.log"
          ADDED=$(grep 'Inserted:' "$LOG" | tail -1 | grep -oP '\d+' | tail -1 || echo "0")
          SKIPPED=$(grep 'Skipped:' "$LOG" | tail -1 | grep -oP '\d+' | tail -1 || echo "0")
          FAILED=$(grep 'Failed:' "$LOG" | tail -1 | grep -oP '\d+' | tail -1 || echo "0")
          FETCHED=$(grep 'Fetched:' "$LOG" | tail -1 | grep -oP '\d+' || echo "0")
          EXTRACTED=$(grep 'Extracted:' "$LOG" | tail -1 | grep -oP '\d+' || echo "0")
          URLS=$(grep 'Unique URLs:' "$LOG" | grep -oP '\d+' || echo "0")

          # 北京时间
          BJ_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')

          # 判断状态
          STATUS="success"
          TEMPLATE="green"
          TITLE="✅ 每日知识爬取完成"

          if [ "$ADDED" -eq 0 ] && [ "$FAILED" -gt 0 ]; then
            TEMPLATE="red"
            TITLE="❌ 知识爬取失败"
            STATUS="failed"
          elif [ "$ADDED" -eq 0 ]; then
            TEMPLATE="blue"
            TITLE="📥 每日知识爬取（无新增）"
          fi

          # 发送飞书通知
          curl -s -X POST "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"msg_type\": \"interactive\",
              \"card\": {
                \"header\": {
                  \"title\": {\"tag\": \"plain_text\", \"content\": \"$TITLE\"},
                  \"template\": \"$TEMPLATE\"
                },
                \"elements\": [{
                  \"tag\": \"div\",
                  \"text\": {
                    \"tag\": \"lark_md\",
                    \"content\": \"**🕐 时间**: $BJ_TIME (北京时间)\n**🔍 搜索关键词**: 91 个\n**🌐 搜索结果**: $URLS 个 URL\n**📄 抓取文章**: $FETCHED 篇\n**🧠 提取知识**: $EXTRACTED 条\n**✅ 新增入库**: $ADDED 条\n**⏭️ 去重跳过**: $SKIPPED 条\n**❌ 失败**: $FAILED 条\"
                  }
                }]
              }
            }"
